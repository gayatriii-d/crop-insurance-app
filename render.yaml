# render.yaml — Deploy to Render.com
# https://render.com/docs/blueprint-spec

services:
  # ── Flask API ───────────────────────────────────────────────────
  - type: web
    name: crop-insurance-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crop-insurance-db
          property: connectionString
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: FLASK_ENV
        value: production

  # ── React Frontend ──────────────────────────────────────────────
  - type: web
    name: crop-insurance-ui
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        sync: false   # Set manually to your API's Render URL

databases:
  - name: crop-insurance-db
    plan: free
    databaseName: crop_insurance
    user: postgres
